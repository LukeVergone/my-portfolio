<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="assets/css/modern-normalize.css" />
    <link rel="stylesheet" href="assets/css/site.css" />
    <title>Luke Vergone | Portfolio | Home Page</title>
  </head>
  <body class="bg-parchment">
    <header
      class="sticky top-0 flex items-start flex-col justify-between p-6 md:flex-row gap-2 bg-iron-grey text-parchment"
    >
      <a class="flex items-center mb-4 title-font md:mb-0 gap-6">
        <img
          src="assets/img/hourglass.png"
          alt="Hourglass Logo"
          class="h-16 rounded-full"
        />
        <div>
          <h1 class="text-xl h-8 text-parchment">Luke Vergone</h1>
          <h2 class="text-base h-12 text-parchment">Portfolio</h2>
        </div>
      </a>
      <div class="flex text-base md:ml-auto">
        <nav>
          <ul class="flex gap-6">
            <li>
              <a
                href="index.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Home</a
              >
            </li>
            <li>
              <a
                href="about.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >About</a
              >
            </li>
            <li>
              <a
                href="contact.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Contact</a
              >
            </li>
            <li>
              <a
                href="projects.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Projects</a
              >
            </li>
            <li>
              <a
                href="resume.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Resume</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="max-w-6xl mx-auto p-6 bg-cotton-rose">
      <article class="max-w-xl mx-auto">
        <h2 class="text-xl font-bold mb-4">Contact Form</h2>

        <form id="contactForm" class="flex flex-col gap-4">
          <div>
            <label for="name" class="block mb-2 font-semibold"> Name </label>
            <input
              type="text"
              id="name"
              name="name"
              class="w-full p-4 border rounded-lg bg-white"
              placeholder="Enter your name"
            />

            <p id="nameError" class="text-red-500 mt-2"></p>
          </div>

          <div>
            <label for="email" class="block mb-2 font-semibold"> Email </label>
            <input
              type="email"
              id="email"
              name="email"
              class="w-full p-4 border rounded-lg bg-white"
              placeholder="Enter your email"
            />
            <p id="emailError" class="text-red-500 mt-2"></p>
          </div>

          <div>
            <label for="message" class="block mb-2 font-semibold">
              Message
            </label>
            <textarea
              id="message"
              name="message"
              rows="6"
              class="w-full p-4 border rounded-lg bg-white"
              placeholder="Type your message here..."
            ></textarea>
            <p id="messageError" class="text-red-500 mt-2"></p>
          </div>

          <button
            type="submit"
            class="bg-iron-grey text-parchment p-4 rounded-lg"
          >
            Submit
          </button>
        </form>
      </article>
    </main>

    <footer
      class="text-parchment bg-iron-grey body-font w-full flex flex-col items-start justify-between p-6 md:flex-row gap-2"
    >
      <a
        class="flex items-center mb-4 title-font md:mb-0 gap-2 hover:text-white transition duration-500 ease-in-out"
      >
        <h1 class="text-sm">Luke Vergone</h1>
      </a>
      <div
        class="flex flex-wrap text-sm pl-6 ml-6 text-base border-l border-gray-400 grow"
      >
        <a
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >© Copyright 2026 Luke Vergone, all rights reserved.
        </a>
      </div>
      <div
        class="flex flex-wrap text-sm pl-6 ml-6 text-base border-l border-gray-400 md:mr-auto gap-2"
      >
        <a
          href="index.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >Home</a
        >
        <a
          href="about.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >About</a
        >
        <a
          href="contact.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >Contact</a
        >
      </div>
    </footer>

    <script src="assets/js/contact.js"></script>
  </body>
</html>
