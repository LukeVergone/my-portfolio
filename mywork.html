<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="assets/css/modern-normalize.css" />
    <link rel="stylesheet" href="assets/css/site.css" />
    <title>Luke Vergone | Portfolio | Home Page</title>
  </head>
  <body class="bg-parchment">
    <header
      class="sticky top-0 flex items-start flex-col justify-between p-6 md:flex-row gap-2 bg-iron-grey text-parchment"
    >
      <a class="flex items-center mb-4 title-font md:mb-0 gap-6">
        <img
          src="assets/img/hourglass.png"
          alt="Hourglass Logo"
          class="h-16 rounded-full"
        />
        <div>
          <h1 class="text-xl h-8 text-parchment">Luke Vergone</h1>
          <h2 class="text-base h-12 text-parchment">Portfolio</h2>
        </div>
      </a>
      <div class="flex text-base md:ml-auto">
        <nav>
          <ul class="flex gap-6">
            <li>
              <a
                href="index.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Home</a
              >
            </li>
            <li>
              <a
                href="about.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >About</a
              >
            </li>
            <li>
              <a
                href="contact.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Contact</a
              >
            </li>
            <li>
              <a
                href="projects.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Projects</a
              >
            </li>
            <li>
              <a
                href="resume.html"
                class="flex gap-6 hover:text-white transition duration-500 ease-in-out"
                >Resume</a
              >
            </li>
          </ul>
        </nav>
      </div>
    </header>
    <main class="max-w-6xl mx-auto p-6">
      <article class="api-form-tile">
        <!--Phase 2: Input Form with API Call-->

        <h2>Ninja API App</h2>

        <form class="api-form">
          <h3 class="centered">Choose one of the below APIs:</h3>
          <div class="checkbox-selection">
            <label>
              <input type="checkbox" id="historicEvent" name="Historic Event" />
              Historic Event that occurred on this day
            </label>

            <label>
              <input type="checkbox" id="randomQuote" name="Random Quote" />
              Generate Random Quote
            </label>
          </div>

          <input type="text" id="userText" name="user input text" />

          <button class="api-call-button" id="buttonExecuteAPICall">
            Get Response
          </button>

          <section>
            <h4>API Response:</h4>
            <textarea id="apiCallResult" class="api-results"> </textarea>
          </section>
        </form>
      </article>
    </main>

    <footer
      class="text-parchment bg-iron-grey body-font w-full flex flex-col items-start justify-between p-6 md:flex-row gap-2"
    >
      <a
        class="flex items-center mb-4 title-font md:mb-0 gap-2 hover:text-white transition duration-500 ease-in-out"
      >
        <h1 class="text-sm">Luke Vergone</h1>
      </a>
      <div
        class="flex flex-wrap text-sm pl-6 ml-6 text-base border-l border-gray-400 grow"
      >
        <a
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >© Copyright 2026 Luke Vergone, all rights reserved.
        </a>
      </div>
      <div
        class="flex flex-wrap text-sm pl-6 ml-6 text-base border-l border-gray-400 md:mr-auto gap-2"
      >
        <a
          href="index.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >Home</a
        >
        <a
          href="about.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >About</a
        >
        <a
          href="contact.html"
          class="border-b border-gray-400 hover:border-gray-200 hover:text-white transition duration-500 ease-in-out"
          >Contact</a
        >
      </div>
    </footer>
    <script src="assets/js/script.js"></script>
  </body>
</html>
